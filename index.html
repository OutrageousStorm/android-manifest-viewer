<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AndroidManifest Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #fff;
      font-size: 2.5em;
    }
    .upload-zone {
      border: 3px dashed #4a9eff;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(74, 158, 255, 0.05);
    }
    .upload-zone:hover, .upload-zone.dragover {
      background: rgba(74, 158, 255, 0.15);
      border-color: #6bb3ff;
    }
    .upload-zone p {
      font-size: 1.1em;
      margin-bottom: 10px;
    }
    input[type="file"] {
      display: none;
    }
    .controls {
      margin: 20px 0;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      background: #4a9eff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.2s;
    }
    button:hover {
      background: #6bb3ff;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .output {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .panel {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .panel h2 {
      color: #4a9eff;
      margin-bottom: 15px;
      font-size: 1.3em;
    }
    textarea {
      width: 100%;
      height: 500px;
      background: #1a1a2e;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 15px;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 0.9em;
      resize: vertical;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .info-card {
      background: rgba(74, 158, 255, 0.1);
      border-left: 4px solid #4a9eff;
      padding: 15px;
      border-radius: 4px;
    }
    .info-card label {
      display: block;
      color: #999;
      font-size: 0.85em;
      margin-bottom: 5px;
    }
    .info-card .value {
      color: #4a9eff;
      font-weight: 600;
      word-break: break-all;
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .tag {
      background: rgba(74, 158, 255, 0.2);
      color: #4a9eff;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85em;
    }
    @media (max-width: 1024px) {
      .output { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 AndroidManifest Viewer</h1>
    
    <div class="upload-zone" id="uploadZone">
      <p>📦 Drop APK or AndroidManifest.xml here</p>
      <small>or click to select</small>
      <input type="file" id="fileInput" accept=".apk,.xml">
    </div>

    <div class="controls" id="controls" style="display: none;">
      <button onclick="copyToClipboard('raw')">Copy Raw XML</button>
      <button onclick="copyToClipboard('pretty')">Copy Formatted</button>
      <button onclick="downloadXML()">Download XML</button>
      <button onclick="reset()">Reset</button>
    </div>

    <div class="output" id="output" style="display: none;">
      <div class="panel">
        <h2>📋 Manifest Info</h2>
        <div class="info-grid" id="infoGrid"></div>
      </div>
      <div class="panel">
        <h2>Raw XML</h2>
        <textarea id="rawXml" readonly></textarea>
      </div>
      <div class="panel" style="grid-column: 1/-1;">
        <h2>Formatted XML</h2>
        <textarea id="prettyXml" readonly></textarea>
      </div>
    </div>
  </div>

  <script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const controls = document.getElementById('controls');
    const output = document.getElementById('output');
    let currentXml = '';
    let currentPrettyXml = '';

    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    async function handleFile(file) {
      if (!file) return;
      if (file.name.endsWith('.apk')) {
        const zip = new JSZip();
        const zipData = await zip.loadAsync(file);
        const manifestFile = zipData.file('AndroidManifest.xml');
        if (!manifestFile) {
          alert('AndroidManifest.xml not found in APK');
          return;
        }
        const arrayBuffer = await manifestFile.async('arraybuffer');
        // Try to decode binary AndroidManifest (this is complex; for now extract as-is)
        currentXml = 'Binary AndroidManifest detected. Please extract with apktool first.';
      } else if (file.name.endsWith('.xml')) {
        currentXml = await file.text();
      } else {
        alert('Upload APK or XML file');
        return;
      }
      
      displayManifest();
    }

    function displayManifest() {
      currentPrettyXml = formatXml(currentXml);
      document.getElementById('rawXml').value = currentXml;
      document.getElementById('prettyXml').value = currentPrettyXml;

      // Parse info
      const parser = new DOMParser();
      const doc = parser.parseFromString(currentXml, 'text/xml');
      const manifest = doc.querySelector('manifest');
      
      const info = {
        'Package': manifest?.getAttribute('package') || 'N/A',
        'Version': manifest?.getAttribute('android:versionName') || 'N/A',
        'Version Code': manifest?.getAttribute('android:versionCode') || 'N/A',
      };

      const permissions = Array.from(doc.querySelectorAll('uses-permission')).map(p => p.getAttribute('android:name'));
      const activities = Array.from(doc.querySelectorAll('activity')).map(a => a.getAttribute('android:name'));

      let html = '';
      for (const [key, val] of Object.entries(info)) {
        html += `<div class="info-card"><label>${key}</label><div class="value">${val}</div></div>`;
      }
      html += `<div class="info-card"><label>Permissions (${permissions.length})</label><div class="tag-list">${permissions.slice(0, 10).map(p => `<span class="tag">${p.split('.')[-1]}</span>`).join('')}</div></div>`;
      html += `<div class="info-card"><label>Activities (${activities.length})</label><div class="tag-list">${activities.slice(0, 5).map(a => `<span class="tag">${a.split('.')[-1]}</span>`).join('')}</div></div>`;

      document.getElementById('infoGrid').innerHTML = html;
      controls.style.display = 'flex';
      output.style.display = 'grid';
    }

    function formatXml(xml) {
      let formatted = '';
      let indent = 0;
      xml.split(/>\s*</g).forEach(node => {
        if (node.match(/^\/\w/)) indent--;
        const spacing = '  '.repeat(Math.max(0, indent));
        formatted += spacing + '<' + node + '>
';
        if (!node.match(/^\w[^>]*\//) && !node.match(/^\?xml/) && !node.startsWith('!')) indent++;
      });
      return formatted.substring(1).slice(0, -3);
    }

    function copyToClipboard(type) {
      const text = type === 'raw' ? currentXml : currentPrettyXml;
      navigator.clipboard.writeText(text).then(() => alert('Copied!'));
    }

    function downloadXml() {
      const blob = new Blob([currentPrettyXml], { type: 'application/xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'AndroidManifest.xml';
      a.click();
    }

    function reset() {
      fileInput.value = '';
      controls.style.display = 'none';
      output.style.display = 'none';
      currentXml = '';
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
