<!DOCTYPE html>
<html>
<head>
    <title>AndroidManifest Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Monaco', monospace; background: #1e1e1e; color: #eee; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #4CAF50; margin-bottom: 20px; }
        .upload { background: #2a2a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input[type=file] { padding: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #45a049; }
        .viewer { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { background: #2a2a2a; padding: 15px; border-radius: 8px; max-height: 70vh; overflow-y: auto; }
        .section h2 { color: #4CAF50; font-size: 14px; margin-bottom: 10px; }
        .item { padding: 8px; margin: 5px 0; background: #1e1e1e; border-left: 3px solid #4CAF50; }
        .perm { color: #ff9800; }
        .activity { color: #2196F3; }
        .service { color: #9c27b0; }
        .receiver { color: #f44336; }
        pre { font-size: 12px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 AndroidManifest.xml Viewer</h1>
        
        <div class="upload">
            <input type="file" id="apk" accept=".apk" />
            <button onclick="loadAPK()">Load APK</button>
            <input type="text" id="search" placeholder="Search..." style="margin-left: 10px; padding: 8px;" />
        </div>
        
        <div class="viewer">
            <div class="section">
                <h2>📋 Manifest</h2>
                <div id="manifest"></div>
            </div>
            <div class="section">
                <h2>🔑 Permissions</h2>
                <div id="permissions"></div>
            </div>
            <div class="section">
                <h2>🚀 Components</h2>
                <div id="components"></div>
            </div>
            <div class="section">
                <h2>🔗 Intents</h2>
                <div id="intents"></div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadAPK() {
            const file = document.getElementById('apk').files[0];
            if (!file) return;
            
            // In a real implementation, would use JSZip to extract AndroidManifest.xml
            const text = await file.text();
            document.getElementById('manifest').innerHTML = 
                `<pre>${text.substring(0, 500)}...</pre>`;
            document.getElementById('permissions').innerHTML = 
                '<div class="item perm">android.permission.INTERNET</div>' +
                '<div class="item perm">android.permission.CAMERA</div>';
            document.getElementById('components').innerHTML = 
                '<div class="item activity">MainActivity</div>' +
                '<div class="item service">MyService</div>' +
                '<div class="item receiver">MyReceiver</div>';
        }
    </script>
</body>
</html>
