<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndroidManifest.xml Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #1e1e1e;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #4fc3f7;
            margin-bottom: 20px;
        }
        .upload-area {
            border: 2px dashed #4fc3f7;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: rgba(79, 195, 247, 0.1);
            border-color: #81d4fa;
        }
        .upload-area input {
            display: none;
        }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #404040;
        }
        .panel h2 {
            color: #4fc3f7;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .panel ul {
            list-style: none;
        }
        .panel li {
            padding: 8px 0;
            border-bottom: 1px solid #404040;
            font-size: 12px;
        }
        .panel li:last-child {
            border-bottom: none;
        }
        .panel li strong {
            color: #81d4fa;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #404040;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Monaco', monospace;
            font-size: 11px;
            resize: vertical;
        }
        .search-box {
            width: 100%;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #404040;
            color: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .permission { color: #ff7043; }
        .activity { color: #66bb6a; }
        .service { color: #ffa726; }
        .receiver { color: #ab47bc; }
        .provider { color: #29b6f6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 AndroidManifest.xml Viewer</h1>
        
        <div class="upload-area" id="dropzone">
            <p>Drag & drop APK file here or click to select</p>
            <input type="file" id="fileInput" accept=".apk">
        </div>

        <div class="content" id="content" style="display:none;">
            <div class="panel">
                <h2>📦 Manifest Info</h2>
                <ul id="manifestInfo"></ul>
            </div>
            <div class="panel">
                <h2>🔍 Search</h2>
                <input type="text" class="search-box" id="searchBox" placeholder="Search permissions, activities...">
                <textarea id="manifestText" readonly></textarea>
            </div>
            <div class="panel">
                <h2>🔓 Permissions</h2>
                <ul id="permissions"></ul>
            </div>
            <div class="panel">
                <h2>🎯 Activities</h2>
                <ul id="activities"></ul>
            </div>
            <div class="panel">
                <h2>⚙️ Services</h2>
                <ul id="services"></ul>
            </div>
            <div class="panel">
                <h2>📢 Receivers</h2>
                <ul id="receivers"></ul>
            </div>
            <div class="panel">
                <h2>💾 Providers</h2>
                <ul id="providers"></ul>
            </div>
        </div>
    </div>

    <script>
        // Parse AndroidManifest.xml from APK (ZIP)
        async function parseAPK(file) {
            const JSZip = (await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm')).default;
            const zip = new JSZip();
            const zipFile = await zip.loadAsync(file);
            const manifest = zipFile.file('AndroidManifest.xml');
            if (!manifest) {
                alert('No AndroidManifest.xml found in APK');
                return;
            }
            const data = await manifest.async('arraybuffer');
            parseManifestBinary(data);
        }

        function parseManifestBinary(arrayBuffer) {
            // Simplified: extract text strings from binary manifest
            const view = new Uint8Array(arrayBuffer);
            const text = [];
            for (let i = 0; i < view.length; i++) {
                const byte = view[i];
                if (byte >= 32 && byte <= 126) {
                    text.push(String.fromCharCode(byte));
                } else if (text.length > 3) {
                    const word = text.join('');
                    if (word.length > 4) {
                        parseToken(word);
                    }
                    text.length = 0;
                }
            }
        }

        const manifest = {
            package: '',
            permissions: new Set(),
            activities: new Set(),
            services: new Set(),
            receivers: new Set(),
            providers: new Set(),
            version: '',
        };

        function parseToken(token) {
            if (token.includes('permission')) manifest.permissions.add(token);
            if (token.includes('.')) {
                if (token.includes('Activity')) manifest.activities.add(token);
                if (token.includes('Service')) manifest.services.add(token);
                if (token.includes('Receiver')) manifest.receivers.add(token);
                if (token.includes('Provider')) manifest.providers.add(token);
            }
        }

        function render() {
            document.getElementById('content').style.display = 'grid';
            
            // Permissions
            const permList = document.getElementById('permissions');
            permList.innerHTML = Array.from(manifest.permissions)
                .slice(0, 20)
                .map(p => `<li><span class="permission">${p}</span></li>`)
                .join('');
            
            // Activities
            const actList = document.getElementById('activities');
            actList.innerHTML = Array.from(manifest.activities)
                .slice(0, 10)
                .map(a => `<li><span class="activity">${a}</span></li>`)
                .join('');
            
            // Services
            const svcList = document.getElementById('services');
            svcList.innerHTML = Array.from(manifest.services)
                .slice(0, 10)
                .map(s => `<li><span class="service">${s}</span></li>`)
                .join('');
            
            // Receivers
            const recList = document.getElementById('receivers');
            recList.innerHTML = Array.from(manifest.receivers)
                .slice(0, 10)
                .map(r => `<li><span class="receiver">${r}</span></li>`)
                .join('');
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) parseAPK(file);
            setTimeout(render, 500);
        });

        document.getElementById('dropzone').addEventListener('dragover', (e) => {
            e.preventDefault();
            e.target.style.background = 'rgba(79, 195, 247, 0.2)';
        });

        document.getElementById('dropzone').addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.apk')) {
                parseAPK(file);
                setTimeout(render, 500);
            }
        });

        document.getElementById('searchBox').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.panel li').forEach(li => {
                li.style.display = li.textContent.toLowerCase().includes(query) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
